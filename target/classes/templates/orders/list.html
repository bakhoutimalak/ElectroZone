<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Mes Commandes — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .ez-card { background: white; border-radius: 16px; border: 1px solid #e8e8f0; overflow: hidden; }
        thead th { background: #1a1a2e; color: white; padding: 0.85rem 1.2rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: none; }
        tbody td { padding: 1rem 1.2rem; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #fafafa; }
        .badge-CART { background: #f1f5f9; color: #64748b; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; }
        .badge-CONFIRMED { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; }
        .badge-SHIPPED { background: #fff7ed; color: #c2410c; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; }
        .badge-DELIVERED { background: #dcfce7; color: #15803d; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; }
        .badge-CANCELLED { background: #fee2e2; color: #dc2626; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; }
        .btn-view { background: #ede9ff; color: #6c63ff; border: none; border-radius: 8px; padding: 0.35rem 0.8rem; font-weight: 600; font-size: 0.85rem; text-decoration: none; }
        .btn-view:hover { background: #6c63ff; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/items}" class="nav-link" style="color:#555;">Shop</a>
            <a th:href="@{/cart}" class="nav-link" style="color:#555;"><i class="bi bi-cart3 me-1"></i>Panier</a>
            <span class="text-muted small" th:text="${fullName != null and fullName != ''} ? ${fullName} : 'Mon compte'"></span>
            <a th:href="@{/admin/dashboard}" class="btn btn-sm rounded-pill px-3"
               style="background:#6c63ff; color:white;" sec:authorize="hasRole('ADMIN')">Admin</a>
            <a th:href="@{/auth/logout}" class="text-danger text-decoration-none small">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h3 class="fw-bold mb-4">
        <i class="bi bi-bag-check me-2" style="color:#6c63ff;"></i>Mes Commandes
    </h3>

    <div th:if="${orders.isEmpty()}" class="text-center py-5">
        <i class="bi bi-bag" style="font-size:3rem; color:#c4baff;"></i>
        <p class="text-muted mt-3">Aucune commande pour l'instant.</p>
        <a th:href="@{/items}" class="btn rounded-pill px-4 fw-bold"
           style="background:#6c63ff; color:white; border:none;">Commencer mes achats</a>
    </div>

    <div class="ez-card" th:if="${!orders.isEmpty()}">
        <table class="table mb-0">
            <thead>
                <tr>
                    <th>Référence</th>
                    <th>Date</th>
                    <th>Articles</th>
                    <th>Total</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}" th:if="${order.status.name() != 'CART'}">
                    <td class="fw-semibold" style="color:#6c63ff;"
                        th:text="'CMD-' + ${order.id}">CMD</td>
                    <td><small th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Date</small></td>
                    <td>
                        <span class="badge rounded-pill"
                              style="background:#ede9ff; color:#6c63ff;"
                              th:text="${order.orderItems.size()} + ' article(s)'"></span>
                    </td>
                    <td class="fw-semibold"
                        th:text="${#numbers.formatDecimal(order.totalPrice,1,2)} + ' MAD'">0</td>
                    <td>
                        <span th:class="'badge-' + ${order.status.name()}"
                              th:text="${order.status}">STATUT</span>
                    </td>
                    <td>
                        <a th:href="@{'/orders/' + ${order.id}}" class="btn-view">
                            <i class="bi bi-eye me-1"></i>Détail
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
