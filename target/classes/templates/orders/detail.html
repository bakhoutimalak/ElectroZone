<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Commande #' + ${order.id} + ' — ElectroZone'">Commande</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f0efff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .ez-card { background: white; border-radius: 16px; border: 1px solid #e8e8f0; }
        .badge-CART { background: #f1f5f9; color: #64748b; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 600; }
        .badge-CONFIRMED { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 600; }
        .badge-SHIPPED { background: #fff7ed; color: #c2410c; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 600; }
        .badge-DELIVERED { background: #dcfce7; color: #15803d; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 600; }
        .badge-CANCELLED { background: #fee2e2; color: #dc2626; border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.82rem; font-weight: 600; }
        .total-row { background: #f0efff; border-radius: 10px; padding: 1rem 1.2rem; }
        .btn-cancel { background: #fee2e2; color: #dc2626; border: none; border-radius: 10px; padding: 0.65rem 1.5rem; font-weight: 700; width: 100%; }
        .btn-cancel:hover { background: #dc2626; color: white; }
        .ez-select { border: 2px solid #e8e8f0; border-radius: 8px; padding: 0.5rem 1rem; outline: none; }
        .ez-select:focus { border-color: #6c63ff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
        <a th:href="@{/orders}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Mes commandes
        </a>
    </div>
</nav>

<div class="container-fluid pb-5">
<div class="d-flex gap-4 align-items-start" style="max-width:1100px;margin:0 auto;">
<div class="d-none d-lg-flex align-items-center justify-content-center" style="flex:0 0 550px;background:#f0efff;border-radius:20px;">
    <img src="/images/img3.png" style="width:100%;max-width:530px;object-fit:contain;" alt="commande"/>
</div>
<div style="flex:1;">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="ez-card p-4">
        <div class="mb-4">
            <div class="text-muted small fw-semibold" style="letter-spacing:1px;">RÉFÉRENCE COMMANDE</div>
            <h4 class="fw-bold" style="color:#6c63ff;" th:text="'CMD-' + ${order.id}">CMD</h4>
            <div class="text-muted small"
                 th:text="'Passée le ' + ${#temporals.format(order.orderDate, 'dd/MM/yyyy')} + ' à ' + ${#temporals.format(order.orderDate, 'HH:mm')}">Date</div>
            <span th:class="'badge-' + ${order.status.name()} + ' mt-2 d-inline-block'"
                  th:text="${order.status}">STATUT</span>
        </div>

        <div class="mb-4">
            <div class="fw-semibold mb-2">ARTICLES
                <span class="text-muted small ms-2"
                      th:text="${order.orderItems.size()} + ' article(s)'"></span>
            </div>
            <table class="table table-bordered">
                <thead style="background:#f0efff;">
                    <tr>
                        <th style="color:#8b8fa8; font-size:0.8rem;">PRODUIT</th>
                        <th class="text-center" style="color:#8b8fa8; font-size:0.8rem;">QTÉ</th>
                        <th class="text-end" style="color:#8b8fa8; font-size:0.8rem;">PRIX UNIT.</th>
                        <th class="text-end" style="color:#8b8fa8; font-size:0.8rem;">SOUS-TOTAL</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="oi : ${order.orderItems}">
                        <td>
                            <div class="fw-semibold" th:text="${oi.item.name}">Nom</div>
                            <small class="text-muted" th:text="${oi.item.category}">Cat</small>
                        </td>
                        <td class="text-center" th:text="${oi.quantity}">1</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(oi.unitPrice,1,2)} + ' MAD'">0</td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatDecimal(oi.subTotal,1,2)} + ' MAD'">0</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="total-row d-flex justify-content-between align-items-center mb-4">
            <span class="fw-bold fs-5">Total</span>
            <span class="fw-bold fs-4" style="color:#6c63ff;"
                  th:text="${#numbers.formatDecimal(order.totalPrice,1,2)} + ' MAD'">0</span>
        </div>

        <!-- Bouton annuler pour client (CONFIRMED uniquement) -->
        <div th:if="${order.status.name() == 'CONFIRMED'}" sec:authorize="hasRole('USER')"
             class="mb-4">
            <form th:action="@{'/orders/cancel/' + ${order.id}}" method="post"
                  onsubmit="return confirm('Annuler cette commande ?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-cancel">
                    <i class="bi bi-x-circle me-2"></i>Annuler la commande
                </button>
            </form>
        </div>

        <!-- Admin : changer statut -->
        <div sec:authorize="hasRole('ADMIN')" class="mb-4 p-3"
             style="background:#fff7ed; border-radius:12px;">
            <div class="fw-semibold mb-2 small">Mettre à jour le statut (Admin)</div>
            <form th:action="@{'/orders/status/' + ${order.id}}" method="post"
                  class="d-flex gap-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="status" class="ez-select" onchange="this.form.submit()">
                    <option th:each="s : ${T(com.formation.ecommerce.model.Order.OrderStatus).values()}"
                            th:value="${s}" th:text="${s}"
                            th:selected="${s == order.status}"></option>
                </select>
            </form>
        </div>

        <a th:href="@{/orders}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-1"></i>Retour à mes commandes
        </a>
    </div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
