<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${item.name} + ' — ElectroZone'">Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .ez-card { background: white; border-radius: 16px; border: 1px solid #e8e8f0; }
        .price { color: #6c63ff; font-weight: 800; font-size: 2rem; }
        .cat-badge { background: #ede9ff; color: #6c63ff; border-radius: 20px; padding: 0.3rem 1rem; font-size: 0.82rem; font-weight: 700; display: inline-block; }
        .btn-add { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.65rem 1.5rem; font-weight: 700; }
        .btn-add:hover { background: #5a52d5; color: white; }
        .btn-edit { background: #ede9ff; color: #6c63ff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; text-decoration: none; }
        .btn-del { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; text-decoration: none; }
        .desc-section { background: #f9f8ff; border-radius: 12px; padding: 1.2rem 1.5rem; border-left: 4px solid #6c63ff; }
        .desc-content { color: #444; font-size: 0.95rem; line-height: 1.7; white-space: pre-line; }
        .meta-label { font-size: 0.82rem; color: #8b8fa8; display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.2rem; }
        .meta-value { font-weight: 700; font-size: 1rem; }
        .meta-value.text-success { color: #16a34a !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
        <a th:href="@{/items}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>
</nav>

<div class="container pb-5" style="max-width:1200px;">
    <div class="ez-card p-4">

        <!-- BLOC HAUT : image + infos -->
        <div class="row g-4 align-items-start">

            <!-- Image -->
            <div class="col-md-4 text-center">
                <div style="background:#f5f3ff; border-radius:16px; padding:1.5rem; display:flex; align-items:center; justify-content:center; min-height:220px;">
                    <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                         th:src="${item.imageUrl}"
                         style="max-width:100%; max-height:220px; object-fit:contain; border-radius:10px;"
                         alt="image"/>
                    <i th:if="${item.imageUrl == null or item.imageUrl.isEmpty()}"
                       class="bi bi-box-seam" style="font-size:3.5rem; color:#c4baff;"></i>
                </div>
                <div class="mt-3">
                    <span class="cat-badge" th:text="${item.category}">Cat</span>
                </div>
            </div>

            <!-- Infos produit -->
            <div class="col-md-8">
                <h2 class="fw-bold mb-1" th:text="${item.name}">Nom</h2>
                <div class="price mb-4" th:text="${#numbers.formatDecimal(item.price,1,2)} + ' MAD'">0</div>

                <!-- Stock + Expiration + ID -->
                <div class="d-flex gap-4 flex-wrap mb-4">
                    <div>
                        <div class="meta-label"><i class="bi bi-box-seam"></i> Stock</div>
                        <div class="meta-value"
                             th:classappend="${item.quantityInStock > 0 ? ' text-success' : ' text-danger'}"
                             th:text="${item.quantityInStock > 0 ? item.quantityInStock + ' dispo' : 'Épuisé'}"></div>
                    </div>
                    <div>
                        <div class="meta-label"><i class="bi bi-calendar3"></i> Expiration</div>
                        <div class="meta-value" th:text="${item.expirationDate}">Date</div>
                    </div>
                    <div sec:authorize="hasRole('ADMIN')">
                        <div class="meta-label"><i class="bi bi-hash"></i> ID</div>
                        <div class="meta-value" th:text="'#' + ${item.id}">ID</div>
                    </div>
                </div>

                <!-- Boutons -->
                <div class="d-flex gap-3 flex-wrap">
                    <form th:action="@{'/cart/add/' + ${item.id}}" method="post"
                          sec:authorize="hasRole('USER')" th:if="${item.quantityInStock > 0}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="input-group">
                            <input type="number" name="quantity" value="1" min="1"
                                   th:max="${item.quantityInStock}"
                                   class="form-control" style="max-width:80px; border-radius:10px 0 0 10px;"/>
                            <button type="submit" class="btn-add">
                                <i class="bi bi-cart-plus me-1"></i>Ajouter au panier
                            </button>
                        </div>
                    </form>
                    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{'/items/edit/' + ${item.id}}" class="btn-edit">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                        <a th:href="@{'/items/delete/' + ${item.id}}" class="btn-del"
                           onclick="return confirm('Supprimer ?')">
                            <i class="bi bi-trash me-1"></i>Supprimer
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- BLOC BAS : description -->
        <div class="mt-4" th:if="${item.description != null and !item.description.isEmpty()}">
            <div class="desc-section">
                <h5 class="fw-bold mb-3" style="color:#1a1a2e;">
                    <i class="bi bi-info-circle me-2" style="color:#6c63ff;"></i>Description
                </h5>
                <div class="desc-content" th:text="${item.description}">Description</div>
            </div>
        </div>

    </div>

    <!-- RECOMMANDATIONS -->
    <div class="mt-4" th:if="${related != null and !related.isEmpty()}">
        <h5 class="fw-bold mb-3">Produits similaires</h5>
        <div class="row g-3">
            <div class="col-md-3" th:each="r : ${related}">
                <a th:href="@{'/items/' + ${r.id}}" style="text-decoration:none;">
                    <div style="background:white; border-radius:14px; border:1px solid #e8e8f0; overflow:hidden; transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='none'">
                        <div style="background:#f5f3ff; height:140px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                            <img th:if="${r.imageUrl != null and !r.imageUrl.isEmpty()}"
                                 th:src="${r.imageUrl}"
                                 style="max-width:100%; max-height:140px; object-fit:contain;"/>
                            <i th:if="${r.imageUrl == null or r.imageUrl.isEmpty()}"
                               class="bi bi-box-seam" style="font-size:2.5rem; color:#c4baff;"></i>
                        </div>
                        <div style="padding:0.9rem;">
                            <div style="background:#ede9ff; color:#6c63ff; border-radius:20px; padding:0.15rem 0.7rem; font-size:0.72rem; font-weight:700; display:inline-block; margin-bottom:0.4rem;" th:text="${r.category}">Cat</div>
                            <div style="font-weight:700; font-size:0.92rem; color:#1a1a2e; margin-bottom:0.3rem;" th:text="${r.name}">Nom</div>
                            <div style="color:#6c63ff; font-weight:800; font-size:1rem;" th:text="${#numbers.formatDecimal(r.price,1,2)} + ' MAD'">0</div>
                            <div style="font-size:0.78rem; margin-top:0.4rem;">
                                <span th:style="${r.quantityInStock > 0} ? 'color:#16a34a;' : 'color:#dc2626;'"
                                      th:text="${r.quantityInStock > 0} ? ${r.quantityInStock} + ' en stock' : 'Épuisé'"></span>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
