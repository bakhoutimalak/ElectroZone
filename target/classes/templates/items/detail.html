<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${item.name} + ' — ElectroZone'">Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .ez-card { background: white; border-radius: 16px; border: 1px solid #e8e8f0; }
        .price { color: #6c63ff; font-weight: 800; font-size: 2rem; }
        .cat-badge { background: #ede9ff; color: #6c63ff; border-radius: 20px; padding: 0.3rem 1rem; font-size: 0.82rem; font-weight: 700; }
        .meta-row { padding: 0.75rem 0; border-bottom: 1px solid #f5f3ff; }
        .btn-add { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.65rem 1.5rem; font-weight: 700; }
        .btn-add:hover { background: #5a52d5; color: white; }
        .btn-edit { background: #ede9ff; color: #6c63ff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; text-decoration: none; }
        .btn-del { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
        <a th:href="@{/items}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>
</nav>

<div class="container pb-5" style="max-width:800px;">
    <div class="ez-card p-4">
        <div class="row align-items-center g-4">
            <div class="col-md-3 text-center">
                <div style="background:#f5f3ff; border-radius:16px; padding:2rem; display:flex; align-items:center; justify-content:center; min-height:200px;">
                    <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                         th:src="${item.imageUrl}"
                         style="max-width:100%; max-height:200px; object-fit:contain; border-radius:10px;"
                         alt="image"/>
                    <i th:if="${item.imageUrl == null or item.imageUrl.isEmpty()}"
                       class="bi bi-box-seam" style="font-size:3.5rem; color:#c4baff;"></i>
                </div>
                <div class="mt-3">
                    <span class="cat-badge" th:text="${item.category}">Cat</span>
                </div>
            </div>
            <div class="col-md-9">
                <h2 class="fw-bold mb-2" th:text="${item.name}">Nom</h2>
                <p class="text-muted mb-3" th:text="${item.description}">Description</p>
                <div class="price mb-3" th:text="${#numbers.formatDecimal(item.price,1,2)} + ' MAD'">0</div>

                <div class="row">
                    <div class="col-4 meta-row">
                        <small class="text-muted d-block"><i class="bi bi-box-seam me-1"></i>Stock</small>
                        <strong th:class="${item.quantityInStock > 0 ? 'text-success' : 'text-danger'}"
                                th:text="${item.quantityInStock > 0 ? item.quantityInStock + ' dispo' : 'Épuisé'}"></strong>
                    </div>
                    <div class="col-4 meta-row">
                        <small class="text-muted d-block"><i class="bi bi-calendar3 me-1"></i>Expiration</small>
                        <strong th:text="${item.expirationDate}">Date</strong>
                    </div>
                    <div class="col-4 meta-row">
                        <small class="text-muted d-block"><i class="bi bi-hash me-1"></i>ID</small>
                        <strong th:text="'#' + ${item.id}">ID</strong>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4 flex-wrap">
                    <form th:action="@{'/cart/add/' + ${item.id}}" method="post"
                          sec:authorize="hasRole('USER')" th:if="${item.quantityInStock > 0}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="input-group">
                            <input type="number" name="quantity" value="1" min="1"
                                   th:max="${item.quantityInStock}"
                                   class="form-control" style="max-width:80px; border-radius:10px 0 0 10px;"/>
                            <button type="submit" class="btn-add">
                                <i class="bi bi-cart-plus me-1"></i>Ajouter au panier
                            </button>
                        </div>
                    </form>
                    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{'/items/edit/' + ${item.id}}" class="btn-edit">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                        <a th:href="@{'/items/delete/' + ${item.id}}" class="btn-del"
                           onclick="return confirm('Supprimer ?')">
                            <i class="bi bi-trash me-1"></i>Supprimer
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
