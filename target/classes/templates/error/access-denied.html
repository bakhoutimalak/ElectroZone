<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Erreur — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        body { background: #f5f3ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .err-card { background: white; border-radius: 20px; padding: 3rem; text-align: center; max-width: 480px; border: 1px solid #e8e8f0; }
        .btn-home { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.65rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
<div class="err-card">
    <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
    <h4 class="fw-bold mb-2" th:text="${errorTitle != null ? errorTitle : 'Erreur'}">Erreur</h4>
    <p class="text-muted mb-4" th:text="${errorMessage != null ? errorMessage : 'Une erreur est survenue.'}">Message</p>
    <div class="d-flex gap-3 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">Retour</a>
        <a th:href="@{/items}" class="btn-home rounded-pill px-4">Accueil</a>
    </div>
</div>
</body>
</html>
