<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Inscription — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .register-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(108,99,255,0.12); max-width: 580px; width: 100%; padding: 2.5rem; }
        .brand { color: #6c63ff; font-weight: 800; font-size: 1.6rem; }
        .ez-field { border: 2px solid #e8e8f0; border-radius: 10px; padding: 0.65rem 1rem; width: 100%; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .ez-field:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        .ez-field.is-invalid { border-color: #ef4444; }
        .ez-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; display: block; margin-bottom: 0.4rem; }
        .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #6c63ff; border-bottom: 2px solid #ede9ff; padding-bottom: 0.4rem; margin-bottom: 1rem; margin-top: 1.2rem; }
        .btn-create { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 700; font-size: 1rem; width: 100%; cursor: pointer; transition: background 0.2s; }
        .btn-create:hover { background: #5a52d5; }
        .btn-login { display: block; border: 2px solid #6c63ff; color: #6c63ff; border-radius: 10px; padding: 0.75rem; font-weight: 700; text-align: center; text-decoration: none; margin-top: 0.75rem; transition: all 0.2s; }
        .btn-login:hover { background: #6c63ff; color: white; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="brand mb-1">ElectroZone</div>
    <div class="text-muted small mb-3">Votre boutique électronique</div>
    <h2 class="fw-bold mb-1" style="font-size:1.5rem;">Créer un compte</h2>
    <p class="text-muted small mb-3">Inscription gratuite</p>

    <div th:if="${emailError}" class="alert alert-danger py-2 small rounded-3 mb-3">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${emailError}"></span>
    </div>
    <div th:if="${passwordError}" class="alert alert-danger py-2 small rounded-3 mb-3">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${passwordError}"></span>
    </div>

    <form th:action="@{/auth/register}" th:object="${user}" method="post" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="section-title">INFORMATIONS PERSONNELLES</div>

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="ez-label">Prénom *</label>
                <input type="text" th:field="*{firstName}" class="ez-field"
                       th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid'"
                       placeholder="Votre prénom" required/>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('firstName')}"
                     th:errors="*{firstName}"></div>
            </div>
            <div class="col-md-6">
                <label class="ez-label">Nom *</label>
                <input type="text" th:field="*{lastName}" class="ez-field"
                       th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid'"
                       placeholder="Votre nom" required/>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('lastName')}"
                     th:errors="*{lastName}"></div>
            </div>
        </div>

        <div class="mb-3">
            <label class="ez-label">Adresse email *</label>
            <input type="email" th:field="*{email}" class="ez-field"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                   placeholder="votre@email.com" required/>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="ez-label">Numéro de téléphone *</label>
            <input type="tel" th:field="*{phone}" class="ez-field"
                   th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'"
                   placeholder="0600000000" required/>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}"
                 th:errors="*{phone}"></div>
        </div>

        <div class="section-title">ADRESSE DE LIVRAISON</div>

        <div class="mb-3">
            <label class="ez-label">Adresse</label>
            <input type="text" th:field="*{address}" class="ez-field"
                   placeholder="Numéro et nom de rue"/>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="ez-label">Ville</label>
                <input type="text" th:field="*{city}" class="ez-field" placeholder="Ville"/>
            </div>
            <div class="col-md-6">
                <label class="ez-label">Région</label>
                <input type="text" th:field="*{region}" class="ez-field" placeholder="Région"/>
            </div>
        </div>

        <div class="mb-3">
            <label class="ez-label">Code postal</label>
            <input type="text" th:field="*{postalCode}" class="ez-field" placeholder="00000"/>
        </div>

        <div class="section-title">SÉCURITÉ DU COMPTE</div>

        <div class="mb-3">
            <label class="ez-label">Mot de passe *</label>
            <input type="password" th:field="*{password}" class="ez-field"
                   th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                   placeholder="Minimum 6 caractères" required/>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
        </div>

        <div class="mb-4">
            <label class="ez-label">Confirmer le mot de passe *</label>
            <input type="password" name="confirmPassword" class="ez-field"
                   placeholder="Répétez votre mot de passe" required/>
        </div>

        <button type="submit" class="btn-create">Créer mon compte</button>
        <a th:href="@{/auth/login}" class="btn-login">
            Déjà un compte ? Se connecter
        </a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
