<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Connexion — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0efff; min-height: 100vh; display: flex; }
        .left-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        .right-panel {
            flex: 1;
            overflow: hidden;
        }
        .right-panel img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: right center;
        }
        .login-card { width: 100%; max-width: 420px; }
        .brand { color: #6c63ff; font-weight: 800; font-size: 1.6rem; }
        .ez-field { border: 2px solid #e8e8f0; border-radius: 10px; padding: 0.65rem 1rem; width: 100%; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .ez-field:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        .ez-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; display: block; margin-bottom: 0.4rem; }
        .btn-signin { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 700; font-size: 1rem; width: 100%; cursor: pointer; transition: background 0.2s; }
        .btn-signin:hover { background: #5a52d5; }
        .btn-register { display: block; border: 2px solid #6c63ff; color: #6c63ff; border-radius: 10px; padding: 0.75rem; font-weight: 700; text-align: center; text-decoration: none; margin-top: 0.75rem; transition: all 0.2s; }
        .btn-register:hover { background: #6c63ff; color: white; }
        @media (max-width: 768px) { .right-panel { display: none; } }
    </style>
</head>
<body>
<div class="left-panel">
    <div class="login-card">
        <div class="brand mb-1">ElectroZone</div>
        <div class="text-muted small mb-4">Votre boutique électronique</div>
        <h2 class="fw-bold mb-1" style="font-size:1.6rem;">Bienvenue</h2>
        <p class="text-muted small mb-4">Connectez-vous à votre compte</p>

        <div th:if="${param.error}" class="alert alert-danger py-2 small rounded-3 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>Email ou mot de passe incorrect.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small rounded-3 mb-3">
            <i class="bi bi-check-circle me-1"></i>Déconnexion réussie.
        </div>
        <div th:if="${success}" class="alert alert-success py-2 small rounded-3 mb-3">
            <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="ez-label">Adresse email</label>
                <input type="email" name="username" class="ez-field" placeholder="votre@email.com" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="ez-label">Mot de passe</label>
                <input type="password" name="password" class="ez-field" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-signin">Se connecter</button>
            <a th:href="@{/auth/register}" class="btn-register">Créer un compte</a>
        </form>
    </div>
</div>
<div class="right-panel">
    <img src="/images/img2.png" alt="ElectroZone"/>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
