<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Erreur — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .error-card { background: white; border-radius: 24px; padding: 3rem 2.5rem; text-align: center; max-width: 500px; width: 100%; border: 1px solid #e8e8f0; box-shadow: 0 8px 32px rgba(108,99,255,0.08); }
        .error-number { font-size: 7rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #7c73ff, #c4baff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .error-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.5rem; }
        .error-msg { color: #8b8fa8; margin-bottom: 2rem; }
        .btn-home { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.75rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; }
        .btn-home:hover { background: #5a52d5; color: white; }
        .btn-back { background: white; color: #6c63ff; border: 2px solid #ede9ff; border-radius: 10px; padding: 0.75rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; }
        .btn-back:hover { background: #ede9ff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
    </div>
</nav>
<div class="main">
    <img src="/images/404.png" style="max-width:420px;width:60%;margin-bottom:1.5rem;" alt="erreur"/>
    <div class="error-card">
        <div class="error-title" th:text="${status == 404} ? 'Page introuvable' : (${status == 403} ? 'Accès refusé' : 'Page non trouvée')">Erreur</div>
        <p class="error-msg" th:text="${message != null} ? ${message} : 'Une erreur inattendue s\'est produite.'">Message</p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i>Retour
            </a>
            <a th:href="@{/items}" class="btn-home">
                <i class="bi bi-house me-2"></i>Accueil
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
