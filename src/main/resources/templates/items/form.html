<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${isEdit} ? 'Modifier Article' : 'Nouvel Article'">Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; }
        .admin-sidebar { width: 240px; min-height: 100vh; background: white; border-right: 1px solid #e8e8f0; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 1.5rem; border-bottom: 1px solid #e8e8f0; }
        .brand-icon { width: 38px; height: 38px; background: #6c63ff; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .brand-name { color: #6c63ff; font-weight: 800; font-size: 1rem; }
        .sidebar-section { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #8b8fa8; padding: 1rem 1.5rem 0.3rem; }
        .sidebar-link { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 1.5rem; color: #555; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .sidebar-link:hover { color: #6c63ff; background: #f5f3ff; }
        .sidebar-link.active { color: #6c63ff; background: #ede9ff; border-right: 3px solid #6c63ff; font-weight: 600; }
        .sidebar-link .dot { width: 7px; height: 7px; border-radius: 50%; border: 2px solid currentColor; }
        .sidebar-footer { margin-top: auto; padding: 1rem 1.5rem; border-top: 1px solid #e8e8f0; }
        .user-avatar { width: 34px; height: 34px; background: #6c63ff; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; }
        .admin-main { margin-left: 240px; padding: 2rem; }
        .ez-card { background: white; border-radius: 16px; border: 1px solid #e8e8f0; }
        .ez-card-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid #e8e8f0; font-weight: 700; }
        .ez-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; display: block; margin-bottom: 0.4rem; }
        .ez-field { border: 2px solid #e8e8f0; border-radius: 10px; padding: 0.6rem 1rem; font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .ez-field:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        .ez-field.is-invalid { border-color: #ef4444; }
        .btn-save { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.65rem 2rem; font-weight: 700; }
        .btn-save:hover { background: #5a52d5; color: white; }
        .image-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; border: 2px solid #e8e8f0; }
        .image-placeholder { width: 120px; height: 120px; background: #f5f3ff; border-radius: 10px; border: 2px dashed #c4baff; display: flex; align-items: center; justify-content: center; color: #c4baff; font-size: 2rem; }
    </style>
</head>
<body>
<div class="admin-sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div class="brand-icon">E</div>
        <div><div class="brand-name">ElectroZone</div><div style="font-size:0.72rem; color:#8b8fa8;">Administration</div></div>
    </div>
    <div class="sidebar-section">APERÇU</div>
    <a th:href="@{/admin/dashboard}" class="sidebar-link"><span class="dot"></span>Tableau de bord</a>
    <div class="sidebar-section">CATALOGUE</div>
    <a th:href="@{/admin/products}" class="sidebar-link active"><span class="dot"></span>Produits</a>
    <a th:href="@{/admin/categories}" class="sidebar-link"><span class="dot"></span>Catégories</a>
    <div class="sidebar-section">COMMANDES</div>
    <a th:href="@{/orders/admin}" class="sidebar-link"><span class="dot"></span>Toutes les commandes</a>
        <div class="sidebar-section">ADMINISTRATION</div>
    <a th:href="@{/admin/clients}" class="sidebar-link"><span class="dot"></span>Clients</a>
    <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2 mb-2">
            <div class="user-avatar">A</div>
            <div><div style="font-size:0.82rem; font-weight:600;">admin</div><div style="font-size:0.72rem; color:#8b8fa8;">Super Admin</div></div>
        </div>
        <a th:href="@{/auth/logout}" style="color:#ef4444; text-decoration:none; font-size:0.85rem;">
            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </a>
    </div>
</div>

<div class="admin-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0" th:text="${isEdit} ? 'Modifier l\'article' : 'Nouvel article'">Article</h4>
        <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>

    <div class="ez-card" style="max-width:800px;">
        <div class="ez-card-header" th:text="${isEdit} ? 'Modifier l\'article' : 'Créer un nouvel article'">Formulaire</div>
        <div class="p-4">
            <form th:action="@{/items/save}" th:object="${item}" method="post"
                  enctype="multipart/form-data" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{imageUrl}"/>

                <div class="row g-3">
                    <!-- Image -->
                    <div class="col-12">
                        <label class="ez-label">Image du produit</label>
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                                 th:src="${item.imageUrl}" class="image-preview" alt="Image"/>
                            <div th:if="${item.imageUrl == null or item.imageUrl.isEmpty()}"
                                 class="image-placeholder">
                                <i class="bi bi-image"></i>
                            </div>
                            <div>
                                <input type="file" name="imageFile" class="form-control ez-field"
                                       accept="image/*" style="max-width:300px;"
                                       onchange="previewImage(this)"/>
                                <small class="text-muted">JPG, PNG, WEBP — max 5MB</small>
                            </div>
                        </div>
                    </div>

                    <!-- Nom -->
                    <div class="col-md-8">
                        <label class="ez-label">Nom *</label>
                        <input type="text" th:field="*{name}" class="ez-field"
                               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                               placeholder="Nom de l'article" required/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}"></div>
                    </div>

                    <!-- Catégorie -->
                    <div class="col-md-4">
                        <label class="ez-label">Catégorie</label>
                        <select th:field="*{category}" class="ez-field">
                            <option value="">-- Choisir --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.name}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div class="col-12">
                        <label class="ez-label">Description *</label>
                        <textarea th:field="*{description}" class="ez-field"
                                  th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"
                                  rows="3" placeholder="Description détaillée"></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}"></div>
                    </div>

                    <!-- Prix -->
                    <div class="col-md-4">
                        <label class="ez-label">Prix (MAD) *</label>
                        <input type="number" th:field="*{price}" class="ez-field"
                               th:classappend="${#fields.hasErrors('price')} ? ' is-invalid'"
                               step="0.01" min="0.01" placeholder="0.00" required/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}"
                             th:errors="*{price}"></div>
                    </div>

                    <!-- Quantité -->
                    <div class="col-md-4">
                        <label class="ez-label">Quantité en stock *</label>
                        <input type="number" th:field="*{quantityInStock}" class="ez-field"
                               th:classappend="${#fields.hasErrors('quantityInStock')} ? ' is-invalid'"
                               min="0" placeholder="0" required/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('quantityInStock')}"
                             th:errors="*{quantityInStock}"></div>
                    </div>

                    <!-- Date expiration -->
                    <div class="col-md-4">
                        <label class="ez-label">Date d'expiration *</label>
                        <input type="date" th:field="*{expirationDate}" class="ez-field"
                               th:classappend="${#fields.hasErrors('expirationDate')} ? ' is-invalid'"
                               required/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('expirationDate')}"
                             th:errors="*{expirationDate}"></div>
                    </div>
                </div>

                <hr class="my-4"/>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn-save">
                        <i th:class="${isEdit} ? 'bi bi-check-lg me-2' : 'bi bi-save me-2'"></i>
                        <span th:text="${isEdit} ? 'Enregistrer les modifications' : 'Créer l\'article'"></span>
                    </button>
                    <a th:href="@{/admin/products}" class="btn btn-outline-secondary rounded-pill px-4">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.querySelector('.image-preview');
            const placeholder = document.querySelector('.image-placeholder');
            if (preview) {
                preview.src = e.target.result;
            } else if (placeholder) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'image-preview';
                img.alt = 'Image';
                placeholder.replaceWith(img);
            }
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
