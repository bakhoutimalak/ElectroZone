<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Inscription — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0efff; min-height: 100vh; display: flex; }
        .left-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            min-height: 100vh;
        }
        .right-panel {
            flex: 1;
            overflow: hidden;
        }
        .right-panel img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            object-position: center;
            background: #f0efff;
        }
        .register-card { width: 100%; max-width: 520px; }
        .brand { color: #6c63ff; font-weight: 800; font-size: 1.5rem; }
        .ez-field { border: 2px solid #e8e8f0; border-radius: 10px; padding: 0.6rem 1rem; width: 100%; font-size: 0.9rem; outline: none; transition: border-color 0.2s; background: #fafafa; }
        .ez-field:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); background: white; }
        .ez-field.is-invalid { border-color: #ef4444; }
        .ez-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; display: block; margin-bottom: 0.3rem; }
        .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #6c63ff; border-bottom: 2px solid #ede9ff; padding-bottom: 0.35rem; margin-bottom: 0.8rem; margin-top: 1rem; }
        .btn-create { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 700; font-size: 1rem; width: 100%; cursor: pointer; transition: background 0.2s; }
        .btn-create:hover { background: #5a52d5; }
        .btn-login { display: block; border: 2px solid #6c63ff; color: #6c63ff; border-radius: 10px; padding: 0.72rem; font-weight: 700; text-align: center; text-decoration: none; margin-top: 0.75rem; transition: all 0.2s; }
        .btn-login:hover { background: #6c63ff; color: white; }
        @media (max-width: 768px) { .right-panel { display: none; } }
    </style>
</head>
<body>
<div class="left-panel">
<div class="register-card">
    <div class="brand mb-1">ElectroZone</div>
    <div class="text-muted small mb-2">Votre boutique électronique</div>
    <h2 class="fw-bold mb-0" style="font-size:1.4rem;">Créer un compte</h2>
    <p class="text-muted small mb-2">Inscription gratuite</p>

    <div th:if="${emailError}" class="alert alert-danger py-2 small rounded-3 mb-2">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${emailError}"></span>
    </div>
    <div th:if="${passwordError}" class="alert alert-danger py-2 small rounded-3 mb-2">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${passwordError}"></span>
    </div>

    <form th:action="@{/auth/register}" th:object="${user}" method="post" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="section-title">INFORMATIONS PERSONNELLES</div>
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="ez-label">Prénom *</label>
                <input type="text" th:field="*{firstName}" class="ez-field"
                       th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid'"
                       placeholder="Votre prénom" required/>
            </div>
            <div class="col-6">
                <label class="ez-label">Nom *</label>
                <input type="text" th:field="*{lastName}" class="ez-field"
                       th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid'"
                       placeholder="Votre nom" required/>
            </div>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-7">
                <label class="ez-label">Email *</label>
                <input type="email" th:field="*{email}" class="ez-field"
                       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                       placeholder="votre@email.com" required/>
            </div>
            <div class="col-5">
                <label class="ez-label">Téléphone *</label>
                <input type="tel" th:field="*{phone}" class="ez-field"
                       th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'"
                       placeholder="0600000000" required/>
            </div>
        </div>

        <div class="section-title">ADRESSE DE LIVRAISON</div>
        <div class="mb-2">
            <label class="ez-label">Adresse</label>
            <input type="text" th:field="*{address}" class="ez-field" placeholder="Numéro et nom de rue"/>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-5">
                <label class="ez-label">Ville</label>
                <input type="text" th:field="*{city}" class="ez-field" placeholder="Ville"/>
            </div>
            <div class="col-4">
                <label class="ez-label">Région</label>
                <input type="text" th:field="*{region}" class="ez-field" placeholder="Région"/>
            </div>
            <div class="col-3">
                <label class="ez-label">Code postal</label>
                <input type="text" th:field="*{postalCode}" class="ez-field" placeholder="00000"/>
            </div>
        </div>

        <div class="section-title">SÉCURITÉ DU COMPTE</div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="ez-label">Mot de passe *</label>
                <input type="password" th:field="*{password}" class="ez-field"
                       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                       placeholder="Min. 6 caractères" required/>
            </div>
            <div class="col-6">
                <label class="ez-label">Confirmer *</label>
                <input type="password" name="confirmPassword" class="ez-field" placeholder="Répétez" required/>
            </div>
        </div>

        <button type="submit" class="btn-create">Créer mon compte</button>
        <a th:href="@{/auth/login}" class="btn-login">Déjà un compte ? Se connecter</a>
    </form>
</div>
</div>
<div class="right-panel">
    <img src="/images/img.png" alt="ElectroZone illustration"/>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
