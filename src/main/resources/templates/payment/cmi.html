<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Paiement CMI — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .step-bar { display: flex; align-items: center; gap: 0; margin-bottom: 2rem; }
        .step { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #8b8fa8; }
        .step.active { color: #6c63ff; }
        .step.done { color: #16a34a; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: #e8e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
        .step.active .step-num { background: #6c63ff; color: white; }
        .step.done .step-num { background: #16a34a; color: white; }
        .step-line { flex: 1; height: 2px; background: #e8e8f0; margin: 0 0.5rem; }
        .payment-wrap { background: white; border-radius: 20px; border: 1px solid #e8e8f0; max-width: 480px; margin: 0 auto; overflow: hidden; box-shadow: 0 8px 32px rgba(108,99,255,0.10); }
        .cmi-header { background: linear-gradient(135deg, #1d4ed8, #2563eb); padding: 1.5rem; color: white; text-align: center; }
        .cmi-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 0.3rem; }
        .cmi-subtitle { font-size: 0.82rem; opacity: 0.85; }
        .cmi-body { padding: 1.8rem; }
        .ez-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; display: block; margin-bottom: 0.4rem; }
        .ez-field { border: 2px solid #e8e8f0; border-radius: 10px; padding: 0.65rem 1rem; width: 100%; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .ez-field:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
        .card-preview { background: linear-gradient(135deg, #1d4ed8, #7c3aed); border-radius: 14px; padding: 1.2rem 1.5rem; color: white; margin-bottom: 1.5rem; position: relative; min-height: 140px; }
        .card-chip { width: 36px; height: 28px; background: rgba(255,215,0,0.8); border-radius: 5px; margin-bottom: 1rem; }
        .card-number-display { font-size: 1.1rem; letter-spacing: 3px; font-weight: 600; margin-bottom: 0.8rem; font-family: monospace; }
        .card-info { display: flex; justify-content: space-between; font-size: 0.78rem; opacity: 0.85; }
        .card-logos { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.3rem; }
        .btn-pay { background: #1d4ed8; color: white; border: none; border-radius: 12px; padding: 0.85rem; font-weight: 700; font-size: 1rem; width: 100%; transition: background 0.2s; }
        .btn-pay:hover { background: #1e40af; color: white; }
        .security-info { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: #8b8fa8; margin-top: 1rem; justify-content: center; }
        .order-summary { background: #f5f3ff; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; }
        .total-amount { font-size: 1.4rem; font-weight: 800; color: #1d4ed8; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
        <a th:href="@{'/payment/choose/' + ${order.id}}"
           class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>
</nav>

<div class="container pb-5">
    <div class="step-bar" style="max-width:480px; margin:0 auto 2rem;">
        <div class="step done"><div class="step-num"><i class="bi bi-check"></i></div>Panier</div>
        <div class="step-line"></div>
        <div class="step done"><div class="step-num"><i class="bi bi-check"></i></div>Confirmation</div>
        <div class="step-line"></div>
        <div class="step active"><div class="step-num">3</div>Paiement</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">4</div>Termine</div>
    </div>

    <div th:if="${error}" class="alert alert-danger rounded-3 mb-3"
         style="max-width:480px; margin:0 auto 1rem;">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="payment-wrap">
        <!-- Header CMI -->
        <div class="cmi-header">
            <div class="cmi-logo">CMI</div>
            <div class="cmi-subtitle">Centre Monetique Interbancaire</div>
            <div style="margin-top:0.5rem;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/800px-Visa_Inc._logo.svg.png"
                     style="height:16px; margin-right:8px;" alt="Visa"/>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/800px-Mastercard-logo.svg.png"
                     style="height:18px;" alt="Mastercard"/>
            </div>
        </div>

        <div class="cmi-body">
            <!-- Résumé commande -->
            <div class="order-summary">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-semibold small"
                             th:text="'Commande CMD-' + ${order.id}">CMD</div>
                        <div class="text-muted" style="font-size:0.78rem;"
                             th:text="${order.orderItems.size()} + ' article(s)'"></div>
                    </div>
                    <div class="total-amount"
                         th:text="${#numbers.formatDecimal(order.totalPrice,1,2)} + ' MAD'">0</div>
                </div>
            </div>

            <!-- Apercu carte -->
            <div class="card-preview" id="cardPreview">
                <div class="card-logos">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/800px-Visa_Inc._logo.svg.png"
                         style="height:14px;" alt="Visa" id="logoVisa"/>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/800px-Mastercard-logo.svg.png"
                         style="height:16px;" alt="MC" id="logoMC"/>
                </div>
                <div class="card-chip"></div>
                <div class="card-number-display" id="displayNumber">
                    **** **** **** ****
                </div>
                <div class="card-info">
                    <div>
                        <div style="font-size:0.65rem; opacity:0.7;">TITULAIRE</div>
                        <div id="displayHolder">VOTRE NOM</div>
                    </div>
                    <div>
                        <div style="font-size:0.65rem; opacity:0.7;">EXPIRATION</div>
                        <div id="displayExpiry">MM/AA</div>
                    </div>
                </div>
            </div>

            <!-- Formulaire -->
            <form th:action="@{'/payment/cmi/process/' + ${order.id}}"
                  method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="ez-label">Numero de carte *</label>
                    <input type="text" name="cardNumber" id="cardNumber"
                           class="ez-field" placeholder="0000 0000 0000 0000"
                           maxlength="19" required autocomplete="off"
                           oninput="formatCard(this); updatePreview()"/>
                </div>

                <div class="mb-3">
                    <label class="ez-label">Titulaire de la carte *</label>
                    <input type="text" name="cardHolder" id="cardHolder"
                           class="ez-field" placeholder="NOM PRENOM"
                           required autocomplete="off"
                           oninput="updatePreview()"
                           style="text-transform:uppercase;"/>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="ez-label">Date d'expiration *</label>
                        <input type="text" name="expiry" id="expiry"
                               class="ez-field" placeholder="MM/AA"
                               maxlength="5" required autocomplete="off"
                               oninput="formatExpiry(this); updatePreview()"/>
                    </div>
                    <div class="col-6">
                        <label class="ez-label">CVV *</label>
                        <input type="password" name="cvv" id="cvv"
                               class="ez-field" placeholder="***"
                               maxlength="3" required autocomplete="off"/>
                    </div>
                </div>

                <button type="submit" class="btn-pay">
                    <i class="bi bi-lock-fill me-2"></i>
                    Payer <span th:text="${#numbers.formatDecimal(order.totalPrice,1,2)} + ' MAD'">0</span>
                </button>
            </form>

            <div class="security-info">
                <i class="bi bi-shield-lock-fill" style="color:#16a34a;"></i>
                Paiement securise SSL 256-bit
            </div>
        </div>
    </div>
</div>

<script>
function formatCard(input) {
    let v = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = v.replace(/(.{4})/g, '$1 ').trim();
}

function formatExpiry(input) {
    let v = input.value.replace(/\D/g, '').substring(0, 4);
    if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2);
    input.value = v;
}

function updatePreview() {
    const num = document.getElementById('cardNumber').value || '**** **** **** ****';
    const holder = document.getElementById('cardHolder').value || 'VOTRE NOM';
    const expiry = document.getElementById('expiry').value || 'MM/AA';
    document.getElementById('displayNumber').textContent = num.length > 0 ? num : '**** **** **** ****';
    document.getElementById('displayHolder').textContent = holder.toUpperCase() || 'VOTRE NOM';
    document.getElementById('displayExpiry').textContent = expiry || 'MM/AA';
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
