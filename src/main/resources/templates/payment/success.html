<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Paiement réussi — ElectroZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background: #f5f3ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: white !important; border-bottom: 1px solid #e8e8f0; }
        .navbar-brand { color: #6c63ff !important; font-weight: 800; font-size: 1.4rem; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .success-card { background: white; border-radius: 24px; border: 1px solid #e8e8f0; box-shadow: 0 8px 32px rgba(108,99,255,0.10); max-width: 520px; width: 100%; padding: 3rem 2.5rem; text-align: center; }
        .success-icon { width: 90px; height: 90px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; color: #16a34a; }
        .success-title { font-size: 1.6rem; font-weight: 800; color: #1a1a2e; margin-bottom: 0.5rem; }
        .success-sub { color: #8b8fa8; margin-bottom: 2rem; }
        .order-ref { background: #f5f3ff; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .order-ref-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #8b8fa8; }
        .order-ref-value { font-size: 1.2rem; font-weight: 800; color: #6c63ff; }
        .detail-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #f5f3ff; font-size: 0.9rem; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #8b8fa8; }
        .detail-value { font-weight: 600; color: #1a1a2e; }
        .total-row { background: #f5f3ff; border-radius: 10px; padding: 0.8rem 1rem; margin: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 1.4rem; font-weight: 800; color: #6c63ff; }
        .step-bar { display: flex; align-items: center; gap: 0; margin-bottom: 2rem; max-width: 400px; margin-left: auto; margin-right: auto; }
        .step { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600; color: #8b8fa8; }
        .step.done { color: #16a34a; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background: #e8e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .step.done .step-num { background: #16a34a; color: white; }
        .step-line { flex: 1; height: 2px; background: #16a34a; margin: 0 0.4rem; }
        .btn-orders { background: #6c63ff; color: white; border: none; border-radius: 10px; padding: 0.75rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .btn-orders:hover { background: #5a52d5; color: white; }
        .btn-shop { background: white; color: #6c63ff; border: 2px solid #ede9ff; border-radius: 10px; padding: 0.75rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; transition: all 0.2s; }
        .btn-shop:hover { background: #ede9ff; color: #6c63ff; }
        .badge-paid { background: #dcfce7; color: #16a34a; border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.82rem; font-weight: 700; }
        .badge-cmi { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.82rem; font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/items}">ElectroZone</a>
    </div>
</nav>

<div class="main">
    <div class="success-card">
        <!-- Étapes -->
        <div class="step-bar">
            <div class="step done"><div class="step-num"><i class="bi bi-check" style="font-size:0.6rem;"></i></div>Panier</div>
            <div class="step-line"></div>
            <div class="step done"><div class="step-num"><i class="bi bi-check" style="font-size:0.6rem;"></i></div>Paiement</div>
            <div class="step-line"></div>
            <div class="step done"><div class="step-num"><i class="bi bi-check" style="font-size:0.6rem;"></i></div>Termine</div>
        </div>

        <!-- Icône succès -->
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>

        <div class="success-title">Paiement accepte !</div>
        <p class="success-sub">
            Votre paiement a ete traite avec succes.<br/>
            Votre commande est confirmee.
        </p>

        <!-- Référence commande -->
        <div class="order-ref">
            <div class="order-ref-label">Reference de commande</div>
            <div class="order-ref-value" th:text="'CMD-' + ${order.id}">CMD</div>
        </div>

        <!-- Détails -->
        <div class="mb-3">
            <div class="detail-row">
                <span class="detail-label">Statut paiement</span>
                <span class="badge-paid">Paye</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Mode de paiement</span>
                <span class="badge-cmi">
                    <i class="bi bi-credit-card me-1"></i>CMI
                </span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Articles</span>
                <span class="detail-value"
                      th:text="${order.orderItems.size()} + ' article(s)'"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Statut commande</span>
                <span class="detail-value">CONFIRMED</span>
            </div>
        </div>

        <!-- Total -->
        <div class="total-row">
            <span class="fw-bold">Total paye</span>
            <span class="total-amount"
                  th:text="${#numbers.formatDecimal(order.totalPrice,1,2)} + ' MAD'">0</span>
        </div>

        <!-- Boutons -->
        <div class="d-flex gap-3 justify-content-center flex-wrap mt-3">
            <a th:href="@{/orders}" class="btn-orders">
                <i class="bi bi-bag-check me-2"></i>Mes commandes
            </a>
            <a th:href="@{/items}" class="btn-shop">
                <i class="bi bi-grid me-2"></i>Continuer mes achats
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
